<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duck Motor Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .btn { padding: 20px 40px; font-size: 18px; margin: 10px; cursor: pointer; }
        .stop { background-color: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <h1>Duck Motor Control</h1>
    <h2>Motor 1</h2>
    <button class="btn" onmousedown="sendCmd('forward')" onmouseup="sendCmd('stop')">Forward</button>
    <button class="btn" onmousedown="sendCmd('backward')" onmouseup="sendCmd('stop')">Backward</button>
    <br><br>
    <button class="btn stop" onclick="sendCmd('stop')">EMERGENCY STOP</button>

    <script>
        const activeKeys = new Set();

        function sendCmd(action) {
            fetch('/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action })
            }).catch(err => console.error('Error:', err));
        }

        window.addEventListener('keydown', (event) => {
            if (event.repeat) return; // Prevents OS key-repeat events from trigger-spamming fetch

            const key = event.key.toLowerCase();
            if (key === 'w') {
                activeKeys.add('w');
                sendCmd('forward');
            } else if (key === 's') {
                activeKeys.add('s');
                sendCmd('backward');
            }
        });

        window.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'w' || key === 's') {
                activeKeys.delete(key);
                // Only send stop if no direction keys remain active
                if (!activeKeys.has('w') && !activeKeys.has('s')) {
                    sendCmd('stop');
                }
            }
        });
    </script>
</body>
</html>
